name: DeepWorld v5 — NVIDIA Continuous Simulation

on:
  schedule:
    - cron: '0 */2 * * *'   # Every 2 hours
  workflow_dispatch:          # Manual trigger

permissions:
  contents: write

jobs:
  simulate:
    runs-on: ubuntu-latest
    timeout-minutes: 300  # 5 hour max

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install openai pyyaml sentence-transformers numpy

      - name: Run DeepWorld v5 (NVIDIA)
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          mkdir -p runs
          python3 run.py --days 5 --ticks 12 --delay 0.1 --output runs 2>&1 | tee runs/latest.log

      - name: Commit results
        if: always()  # Commit even on errors for debugging
        run: |
          git config user.name "DeepWorld Bot"
          git config user.email "bot@deepworld.sim"
          git add runs/
          git diff --staged --quiet || git commit -m "sim: $(date +%Y-%m-%d_%H:%M) run [NVIDIA v5]"
          git push
